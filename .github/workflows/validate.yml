name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run validator against repo
        run: python3 scripts/validate_marketplace.py .

      - name: Run unit tests
        run: python3 -m unittest discover tests -v
